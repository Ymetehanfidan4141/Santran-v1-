<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Master Chess - Final Stable</title>
    <style>
        :root { --bg: #121212; --board-border: #3e2723; --white-sq: #f0d9b5; --black-sq: #b58863; --accent: rgba(255, 215, 0, 0.6); --check: #d32f2f; }
        body { background-color: var(--bg); color: #d7ccc8; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .game-wrapper { display: flex; gap: 40px; }
        .board-container { position: relative; padding: 35px; background: var(--board-border); border-radius: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.7); }
        .board { display: grid; grid-template-columns: repeat(8, 70px); grid-template-rows: repeat(8, 70px); border: 3px solid #211007; position: relative; }
        .square { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .white-sq { background-color: var(--white-sq); }
        .black-sq { background-color: var(--black-sq); }
        .piece { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 54px; position: absolute; z-index: 2; pointer-events: none; transition: transform 0.4s ease, opacity 0.3s ease; }
        .piece.white-p { color: #fff; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5)); }
        .piece.black-p { color: #1a1a1a; }
        .captured { opacity: 0; transform: scale(0.1) !important; }
        .selected-sq { background-color: var(--accent) !important; }
        .check-sq { background-color: var(--check) !important; }
        .hint::after { content: ""; width: 18px; height: 18px; background: rgba(0,0,0,0.15); border-radius: 50%; }
        .panel { width: 280px; background: #231512; padding: 25px; border-radius: 15px; border: 1px solid #4e342e; }
        #status { font-size: 1.3rem; text-align: center; margin-bottom: 10px; font-weight: bold; color: #ffccbc; }
        .history { height: 320px; overflow-y: auto; background: #120a08; padding: 10px; font-family: monospace; border-radius: 8px; border: 1px solid #3d2b27; font-size: 14px; }
        .log-item { padding: 5px; border-bottom: 1px solid #2d1d1a; color: #bcaaa4; }
        button { width: 100%; margin-top: 25px; padding: 14px; background: #8d6e63; border: none; color: #fff; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .coords-v, .coords-h { position: absolute; color: #d7ccc8; font-weight: bold; display: flex; justify-content: space-around; }
        .coords-v { left: 10px; top: 35px; flex-direction: column; height: 560px; }
        .coords-h { bottom: 10px; left: 35px; width: 560px; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="board-container">
        <div class="coords-v"><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span></div>
        <div id="board" class="board"></div>
        <div class="coords-h"><span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>H</span></div>
    </div>
    <div class="panel">
        <div id="status">SIRA SİZDE</div>
        <div class="history" id="moves"></div>
        <button onclick="location.reload()">YENİ OYUN</button>
    </div>
</div>

<script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const movesEl = document.getElementById('moves');
    const icons = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♜','N':'♞','B':'♝','Q':'♛','K':'♚','P':'♟' };
    
    let board = [
        ['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],
        ['','','','','','','',''],['','','','','','','',''],
        ['','','','','','','',''],['','','','','','','',''],
        ['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']
    ];

    let selected = null, turn = 'W', isGameOver = false, isAnimating = false;

    function initBoard() {
        boardEl.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const sq = document.createElement('div');
                sq.className = `square ${(r + c) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                sq.dataset.r = r; sq.dataset.c = c;
                sq.onclick = () => userClick(r, c);
                boardEl.appendChild(sq);
                if (board[r][c]) createPiece(r, c, board[r][c]);
            }
        }
    }

    function createPiece(r, c, type) {
        const pDiv = document.createElement('div');
        pDiv.className = `piece ${type === type.toUpperCase() ? 'white-p' : 'black-p'}`;
        pDiv.id = `p-${r}-${c}`; pDiv.innerText = icons[type];
        pDiv.style.transform = `translate(${c * 70}px, ${r * 70}px)`;
        boardEl.appendChild(pDiv);
    }

    async function userClick(r, c) {
        if (isGameOver || turn !== 'W' || isAnimating) return;
        if (selected && isValidMove(selected.r, selected.c, r, c)) {
            const success = await executeMove(selected.r, selected.c, r, c);
            if (success) {
                selected = null; updateView();
                if (!isGameOver) setTimeout(aiMove, 600);
            }
            return;
        }
        if (board[r][c] && board[r][c] === board[r][c].toUpperCase()) {
            selected = {r, c}; updateView(); showHints(r, c);
        } else { selected = null; updateView(); }
    }

    async function executeMove(fr, fc, tr, tc) {
        if (isGameOver) return false;
        
        const piece = board[fr][fc];
        const target = board[tr][tc];

        // Hayali hamle ile şah kontrolü
        board[tr][tc] = piece; board[fr][fc] = '';
        if (isCheck(turn)) {
            board[fr][fc] = piece; board[tr][tc] = target;
            return false;
        }

        isAnimating = true;
        // Log kaydı
        const log = document.createElement('div');
        log.className = 'log-item';
        log.innerText = `${turn==='W'?'Siz':'Bot'}: ${icons[piece]} → ${String.fromCharCode(97+tc)}${8-tr}`;
        movesEl.prepend(log);

        const pDiv = document.getElementById(`p-${fr}-${fc}`);
        if (target) {
            const cap = document.getElementById(`p-${tr}-${tc}`);
            if (cap) { cap.classList.add('captured'); setTimeout(() => cap.remove(), 400); }
        }
        
        if(pDiv) {
            pDiv.id = `p-${tr}-${tc}`;
            pDiv.style.transform = `translate(${tc * 70}px, ${tr * 70}px)`;
        }

        const nextTurn = turn === 'W' ? 'B' : 'W';
        await new Promise(res => setTimeout(res, 450));

        if (isCheckmate(nextTurn)) {
            isGameOver = true;
            statusEl.innerText = "OYUN BİTTİ";
            statusEl.style.color = "#ff5252";
        } else {
            turn = nextTurn;
            statusEl.innerText = turn === 'W' ? "SIRA SİZDE" : "BOT DÜŞÜNÜYOR...";
        }
        
        isAnimating = false;
        updateView();
        return true;
    }

    async function aiMove() {
        if (isGameOver) return;

        // 3 SANİYE KURALI: Bot 3 sn içinde hamle yapamazsa oyun biter.
        const botTimer = setTimeout(() => {
            if (turn === 'B' && !isGameOver) {
                isGameOver = true;
                statusEl.innerText = "OYUN BİTTİ";
                statusEl.style.color = "#ff5252";
            }
        }, 3000);

        let moves = [];
        for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
            if (board[r][c] && board[r][c] === board[r][c].toLowerCase()) {
                for (let tr=0; tr<8; tr++) for (let tc=0; tc<8; tc++) {
                    if (isValidMove(r, c, tr, tc)) {
                        let score = board[tr][tc] ? 10 : 0;
                        moves.push({fr:r, fc:c, tr:tr, tc:tc, score});
                    }
                }
            }
        }

        clearTimeout(botTimer); // Hamle listesi hazırsa zamanlayıcıyı durdur.

        if (moves.length > 0 && !isGameOver) {
            moves.sort((a,b) => b.score - a.score);
            const m = moves[Math.floor(Math.random() * Math.min(moves.length, 3))];
            await executeMove(m.fr, m.fc, m.tr, m.tc);
        } else if (!isGameOver) {
            isGameOver = true;
            statusEl.innerText = "OYUN BİTTİ";
        }
    }

    function updateView() {
        const checkPos = isCheck(turn);
        boardEl.querySelectorAll('.square').forEach(sq => {
            const r = parseInt(sq.dataset.r), c = parseInt(sq.dataset.c);
            sq.classList.remove('selected-sq', 'check-sq', 'hint');
            if (selected && selected.r === r && selected.c === c) sq.classList.add('selected-sq');
            if (board[r][c]?.toLowerCase() === 'k' && ((turn === 'W' && board[r][c] === 'K') || (turn === 'B' && board[r][c] === 'k')) && checkPos) sq.classList.add('check-sq');
        });
    }

    function showHints(r, c) {
        boardEl.querySelectorAll('.square').forEach(sq => {
            if (isValidMove(r, c, parseInt(sq.dataset.r), parseInt(sq.dataset.c))) sq.classList.add('hint');
        });
    }

    function isValidMove(fR, fC, tR, tC) {
        if (tR < 0 || tR > 7 || tC < 0 || tC > 7) return false;
        const p = board[fR][fC].toLowerCase(), isW = board[fR][fC] === board[fR][fC].toUpperCase(), tar = board[tR][tC];
        if (tar && (isW === (tar === tar.toUpperCase()))) return false;
        const dr = tR-fR, dc = tC-fC, sr = Math.sign(dr), sc = Math.sign(dc);
        const clear = () => { let r=fR+sr, c=fC+sc; while(r!==tR || c!==tC) { if(board[r][c]) return false; r+=sr; c+=sc; } return true; };
        switch(p) {
            case 'p': const d=isW?-1:1; if(fC===tC && !tar) return dr===d || (dr===2*d && fR===(isW?6:1) && !board[fR+d][fC]); return Math.abs(dc)===1 && dr===d && tar;
            case 'r': return (fR===tR || fC===tC) && clear();
            case 'n': return (Math.abs(dr)===2 && Math.abs(dc)===1) || (Math.abs(dr)===1 && Math.abs(dc)===2);
            case 'b': return Math.abs(dr)===Math.abs(dc) && clear();
            case 'q': return (fR===tR || fC===tC || Math.abs(dr)===Math.abs(dc)) && clear();
            case 'k': return Math.abs(dr)<=1 && Math.abs(dc)<=1;
        }
        return false;
    }

    function isCheck(color) {
        let kp=null, kc=color==='W'?'K':'k';
        for(let r=0;r<8;r++) for(let c=0;c<8;c++) if(board[r][c]===kc) kp={r,c};
        if(!kp) return false;
        for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
            const p=board[r][c]; if(p && (color==='W'?p===p.toLowerCase():p===p.toUpperCase()))
                if(isValidMove(r,c,kp.r,kp.c)) return true;
        } return false;
    }

    function isCheckmate(color) {
        if(!isCheck(color)) return false;
        for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
            const p=board[r][c]; if(p && (color==='W'?p===p.toUpperCase():p===p.toLowerCase())) {
                for(let tr=0;tr<8;tr++) for(let tc=0;tc<8;tc++) {
                    if(isValidMove(r,c,tr,tc)) {
                        const ts=board[r][c], tt=board[tr][tc];
                        board[tr][tc]=ts; board[r][c]=''; const sc=isCheck(color);
                        board[r][c]=ts; board[tr][tc]=tt; if(!sc) return false;
                    }
                }
            }
        } return true;
    }

    initBoard();
</script>
</body>
</html>
