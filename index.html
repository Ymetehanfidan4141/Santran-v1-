<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Chess Online</title>
    <style>
        :root { 
            --bg: #121212; --panel-bg: #231512; --board-border: #3e2723; 
            --white-sq: #f0d9b5; --black-sq: #b58863; --text: #d7ccc8;
            --accent: rgba(255, 215, 0, 0.6); --check: #d32f2f; --sidebar-bg: #2a1b18;
        }
        .light-mode {
            --bg: #e0e0e0; --panel-bg: #ffffff; --board-border: #5d4037;
            --white-sq: #ffffff; --black-sq: #9e9e9e; --text: #3e2723; --sidebar-bg: #f5f5f5;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; transition: background 0.3s ease; }
        .settings-trigger { position: absolute; top: 20px; left: 20px; background: var(--panel-bg); border: 1px solid var(--board-border); color: var(--text); padding: 10px 15px; cursor: pointer; border-radius: 8px; font-weight: bold; z-index: 100; }
        .settings-panel { position: fixed; top: 0; right: -350px; width: 300px; height: 100%; background: var(--sidebar-bg); box-shadow: -5px 0 15px rgba(0,0,0,0.5); transition: right 0.3s ease; z-index: 1000; padding: 30px; border-left: 2px solid var(--board-border); box-sizing: border-box; }
        .settings-panel.open { right: 0; }
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; margin-bottom: 8px; font-weight: bold; opacity: 0.8; font-size: 14px; }
        .name-input, .diff-select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--board-border); color: var(--text); border-radius: 6px; box-sizing: border-box; }
        .close-panel { background: #d32f2f; color: white; border: none; padding: 5px 10px; cursor: pointer; float: right; border-radius: 4px; }
        .panel-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: var(--panel-bg); border: 1px solid var(--board-border); color: var(--text); cursor: pointer; border-radius: 6px; font-weight: bold; }
        
        .timer-container { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 10px; font-family: monospace; }
        .timer-box { flex: 1; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 6px; text-align: center; border: 1px solid var(--board-border); }
        .timer-box.active { border-color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .timer-label { font-size: 10px; opacity: 0.6; display: block; }
        .timer-val { font-size: 18px; font-weight: bold; }

        .game-wrapper { display: flex; gap: 40px; align-items: flex-start; }
        .board-container { position: relative; padding: 35px; background: var(--board-border); border-radius: 12px; }
        .board { display: grid; grid-template-columns: repeat(8, 70px); grid-template-rows: repeat(8, 70px); border: 3px solid #211007; position: relative; }
        .square { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .white-sq { background-color: var(--white-sq); }
        .black-sq { background-color: var(--black-sq); }
        .piece { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; font-size: 54px; position: absolute; z-index: 2; pointer-events: none; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .piece.white-p { color: #fff; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5)); }
        .piece.black-p { color: #1a1a1a; }
        .captured { opacity: 0; transform: scale(0.1) !important; }
        .selected-sq { background-color: var(--accent) !important; }
        .check-sq { background-color: var(--check) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .hint::after { content: ""; width: 18px; height: 18px; background: rgba(0,0,0,0.15); border-radius: 50%; }
        .panel { width: 280px; background: var(--panel-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--board-border); }
        .history { height: 280px; overflow-y: auto; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; font-size: 13px; border: 1px solid rgba(0,0,0,0.2); }
        .action-btn { width: 100%; margin-top: 20px; padding: 14px; background: #8d6e63; border: none; color: #fff; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .coords-v, .coords-h { position: absolute; color: var(--text); font-weight: bold; display: flex; justify-content: space-around; opacity: 0.7; font-size: 14px; }
        .coords-v { left: 10px; top: 35px; flex-direction: column; height: 560px; }
        .coords-h { bottom: 10px; left: 35px; width: 560px; }
    </style>
</head>
<body>

<button class="settings-trigger" onclick="toggleSettings()">⚙️ <span id="btn-settings">Ayarlar</span></button>

<div id="settingsPanel" class="settings-panel">
    <button class="close-panel" onclick="toggleSettings()">X</button>
    <h2 id="settings-title">Ayarlar</h2>
    
    <div class="setting-group">
        <label id="lbl-name">Oyuncu Adı</label>
        <input type="text" id="userNameInput" class="name-input" placeholder="İsminizi yazın..." oninput="updateUserName()">
    </div>

    <div class="setting-group">
        <label id="lbl-diff">Zorluk Seviyesi</label>
        <select id="difficulty" class="diff-select">
            <option value="easy" id="opt-easy">Kolay (Rastgele)</option>
            <option value="hard" id="opt-hard">Zor (Agresif)</option>
        </select>
    </div>

    <div class="setting-group">
        <label id="lbl-timer-opt">Zamanlayıcı</label>
        <button class="panel-btn" id="btn-timer-toggle" onclick="toggleTimerOption()">Zamanlayıcı: KAPALI</button>
    </div>

    <div class="setting-group">
        <label id="lbl-lang">Dil / Language</label>
        <button class="panel-btn" onclick="setLanguage('tr')">Türkçe</button>
        <button class="panel-btn" onclick="setLanguage('en')">English</button>
    </div>

    <div class="setting-group">
        <label id="lbl-theme">Görünüm</label>
        <button class="panel-btn" onclick="toggleTheme()">🌓 <span id="theme-text">Karanlık Mod</span></button>
    </div>
</div>

<div class="game-wrapper">
    <div class="board-container">
        <div class="coords-v"><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span></div>
        <div id="board" class="board"></div>
        <div class="coords-h"><span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>H</span></div>
    </div>
    <div class="panel">
        <div id="timer-ui" class="timer-container" style="display: none;">
            <div id="timer-w" class="timer-box">
                <span class="timer-label" id="lbl-you">SİZ</span>
                <span id="val-w" class="timer-val">10:00</span>
            </div>
            <div id="timer-b" class="timer-box">
                <span class="timer-label">BOT</span>
                <span id="val-b" class="timer-val">10:00</span>
            </div>
        </div>

        <div id="status" style="font-weight: bold; text-align: center; margin-bottom: 10px; text-transform: uppercase; min-height: 24px;">SIRA SİZDE</div>
        <div class="history" id="moves"></div>
        <button class="action-btn" id="new-game-btn" onclick="resetGame()">YENİ OYUN</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if(type === 'move') { osc.type = 'sine'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); gain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.05); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
        else if(type === 'capture') { osc.type = 'square'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); gain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
        else if(type === 'check') { osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); gain.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
    }

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const movesEl = document.getElementById('moves');
    const settingsPanel = document.getElementById('settingsPanel');
    const userNameInput = document.getElementById('userNameInput');
    
    let playerName = "";
    let currentLang = 'tr';
    let timerEnabled = false;
    let timeW = 600, timeB = 600;
    let timerInterval = null;

    const langData = {
        tr: { turn: "SIRA SİZDE", bot: "BOT DÜŞÜNÜYOR...", win: "MAT! KAZANDINIZ 🎉", lose: "MAT! KAYBETTİNİZ 💀", draw: "BERABERE (PAT)", gameover: "OYUN BİTTİ", newGame: "YENİ OYUN", dark: "Karanlık Mod", light: "Aydınlık Mod", settings: "Ayarlar", lang: "Dil", theme: "Görünüm", you: "Siz", nameLbl: "Oyuncu Adı", namePh: "İsminizi yazın...", diff: "Zorluk", easy: "Kolay", hard: "Zor", timer: "Zamanlayıcı", on: "AÇIK", off: "KAPALI", timeOut: "SÜRE BİTTİ!" },
        en: { turn: "YOUR TURN", bot: "BOT THINKING...", win: "CHECKMATE! YOU WIN 🎉", lose: "CHECKMATE! YOU LOSE 💀", draw: "STALEMATE (DRAW)", gameover: "GAME OVER", newGame: "NEW GAME", dark: "Dark Mode", light: "Light Mode", settings: "Settings", lang: "Language", theme: "Theme", you: "You", nameLbl: "Player Name", namePh: "Type your name...", diff: "Difficulty", easy: "Easy", hard: "Hard", timer: "Timer", on: "ON", off: "OFF", timeOut: "TIME OUT!" }
    };

    const icons = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♜','N':'♞','B':'♝','Q':'♛','K':'♚','P':'♟' };
    let board = [
        ['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],
        ['','','','','','','',''],['','','','','','','',''],
        ['','','','','','','',''],['','','','','','','',''],
        ['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']
    ];

    let selected = null, turn = 'W', isGameOver = false, isAnimating = false;

    function toggleSettings() { settingsPanel.classList.toggle('open'); }
    function updateUserName() { playerName = userNameInput.value.trim(); updateStatus(); }
    
    function toggleTimerOption() {
        timerEnabled = !timerEnabled;
        document.getElementById('btn-timer-toggle').innerText = `${langData[currentLang].timer}: ${timerEnabled ? langData[currentLang].on : langData[currentLang].off}`;
        document.getElementById('timer-ui').style.display = timerEnabled ? 'flex' : 'none';
        if(!timerEnabled) stopTimer();
    }

    function startTimer() {
        if (!timerEnabled || isGameOver) return;
        stopTimer();
        timerInterval = setInterval(() => {
            if (turn === 'W') {
                timeW--;
                if (timeW <= 0) endGame(langData[currentLang].timeOut + " (BOT WINS)");
            } else {
                timeB--;
                if (timeB <= 0) endGame(langData[currentLang].timeOut + " (YOU WIN)");
            }
            updateTimerDisplay();
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); }

    function updateTimerDisplay() {
        const fmt = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
        document.getElementById('val-w').innerText = fmt(timeW);
        document.getElementById('val-b').innerText = fmt(timeB);
        document.getElementById('timer-w').className = `timer-box ${turn==='W'&&timerEnabled?'active':''}`;
        document.getElementById('timer-b').className = `timer-box ${turn==='B'&&timerEnabled?'active':''}`;
    }

    function endGame(msg) {
        isGameOver = true;
        stopTimer();
        statusEl.innerText = msg;
        statusEl.style.color = "#ff5252";
    }

    function resetGame() { location.reload(); }

    function setLanguage(lang) {
        currentLang = lang; updateStatus();
        document.getElementById('new-game-btn').innerText = langData[lang].newGame;
        document.getElementById('btn-settings').innerText = langData[lang].settings;
        document.getElementById('settings-title').innerText = langData[lang].settings;
        document.getElementById('lbl-lang').innerText = langData[lang].lang;
        document.getElementById('lbl-theme').innerText = langData[lang].theme;
        document.getElementById('lbl-name').innerText = langData[lang].nameLbl;
        document.getElementById('lbl-diff').innerText = langData[lang].diff;
        document.getElementById('lbl-timer-opt').innerText = langData[lang].timer;
        document.getElementById('opt-easy').innerText = langData[lang].easy;
        document.getElementById('opt-hard').innerText = langData[lang].hard;
        document.getElementById('lbl-you').innerText = langData[lang].you.toUpperCase();
        document.getElementById('btn-timer-toggle').innerText = `${langData[lang].timer}: ${timerEnabled ? langData[lang].on : langData[lang].off}`;
        userNameInput.placeholder = langData[lang].namePh;
        updateThemeText();
    }

    function updateStatus() {
        if (isGameOver) return;
        const base = turn === 'W' ? (playerName || langData[currentLang].you) : "BOT";
        statusEl.innerText = base + (turn === 'W' ? (currentLang==='tr'?" SIRA SİZDE":"'S TURN") : (currentLang==='tr'?" DÜŞÜNÜYOR...":" IS THINKING..."));
    }

    function initBoard() {
        boardEl.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const sq = document.createElement('div');
                sq.className = `square ${(r + c) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                sq.dataset.r = r; sq.dataset.c = c;
                sq.onclick = () => userClick(r, c);
                boardEl.appendChild(sq);
                if (board[r][c]) createPiece(r, c, board[r][c]);
            }
        }
    }

    function createPiece(r, c, type) {
        const pDiv = document.createElement('div');
        pDiv.className = `piece ${type === type.toUpperCase() ? 'white-p' : 'black-p'}`;
        pDiv.id = `p-${r}-${c}`; pDiv.innerText = icons[type];
        pDiv.style.transform = `translate(${c * 70}px, ${r * 70}px)`;
        boardEl.appendChild(pDiv);
    }

    async function executeMove(fr, fc, tr, tc) {
        const piece = board[fr][fc]; const target = board[tr][tc];
        board[tr][tc] = piece; board[fr][fc] = '';
        if (isCheck(turn)) { board[fr][fc] = piece; board[tr][tc] = target; return false; }

        isAnimating = true;
        if(target) playSound('capture'); else playSound('move');

        const log = document.createElement('div');
        log.style.padding = "4px"; log.style.borderBottom = "1px solid rgba(255,255,255,0.05)";
        log.innerText = `${turn==='W'?(playerName||'Siz'):'Bot'}: ${icons[piece]} ${String.fromCharCode(97+tc)}${8-tr}`;
        movesEl.prepend(log);

        const pDiv = document.getElementById(`p-${fr}-${fc}`);
        if (target) { const cap = document.getElementById(`p-${tr}-${tc}`); if (cap) { cap.classList.add('captured'); setTimeout(() => cap.remove(), 300); } }
        if(pDiv) { pDiv.id = `p-${tr}-${tc}`; pDiv.style.transform = `translate(${tc * 70}px, ${tr * 70}px)`; }

        turn = turn === 'W' ? 'B' : 'W';
        await new Promise(res => setTimeout(res, 350));
        
        checkGameStatus();
        if(!isGameOver) { updateStatus(); startTimer(); }
        isAnimating = false;
        updateView();
        return true;
    }

    async function userClick(r, c) {
        if (isGameOver || turn !== 'W' || isAnimating) return;
        if (selected && isValidMove(selected.r, selected.c, r, c)) {
            const ok = await executeMove(selected.r, selected.c, r, c);
            if (ok) { selected = null; if (!isGameOver) setTimeout(aiMove, 600); }
            return;
        }
        if (board[r][c] && board[r][c] === board[r][c].toUpperCase()) {
            selected = {r, c}; updateView(); showHints(r, c);
        } else { selected = null; updateView(); }
    }

    function checkGameStatus() {
        if (!hasAnyValidMove(turn)) {
            isGameOver = true; stopTimer();
            if (isCheck(turn)) {
                statusEl.innerText = turn === 'W' ? langData[currentLang].lose : langData[currentLang].win;
            } else { statusEl.innerText = langData[currentLang].draw; }
        } else if (isCheck(turn)) playSound('check');
    }

    function hasAnyValidMove(color) {
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            const p = board[r][c];
            if(p && (color === 'W' ? p === p.toUpperCase() : p === p.toLowerCase())) {
                for(let tr=0; tr<8; tr++) for(let tc=0; tc<8; tc++) {
                    if(isValidMove(r, c, tr, tc)) {
                        const org = board[tr][tc]; board[tr][tc] = p; board[r][c] = '';
                        const safe = !isCheck(color);
                        board[r][c] = p; board[tr][tc] = org;
                        if(safe) return true;
                    }
                }
            }
        }
        return false;
    }

    async function aiMove() {
        if (isGameOver) return;
        const diff = document.getElementById('difficulty').value;
        let moves = [];
        for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
            if (board[r][c] && board[r][c] === board[r][c].toLowerCase()) {
                for (let tr=0; tr<8; tr++) for (let tc=0; tc<8; tc++) {
                    if (isValidMove(r, c, tr, tc)) {
                        const org = board[tr][tc]; const p = board[r][c];
                        board[tr][tc] = p; board[r][c] = '';
                        const safe = !isCheck('B');
                        board[r][c] = p; board[tr][tc] = org;
                        if(safe) {
                            let score = org ? {p:10,n:30,b:30,r:50,q:90,k:900}[org.toLowerCase()] * 10 : 0;
                            if(diff === 'hard') score += (3.5 - Math.abs(3.5-tr)) + (3.5 - Math.abs(3.5-tc));
                            moves.push({fr:r, fc:c, tr:tr, tc:tc, score});
                        }
                    }
                }
            }
        }
        if (moves.length > 0) {
            moves.sort((a,b) => b.score - a.score);
            const m = moves[Math.floor(Math.random() * Math.min(moves.length, 2))];
            executeMove(m.fr, m.fc, m.tr, m.tc);
        }
    }

    function isValidMove(fR, fC, tR, tC) {
        const p = board[fR][fC].toLowerCase(), isW = board[fR][fC] === board[fR][fC].toUpperCase(), tar = board[tR][tC];
        if (tar && (isW === (tar === tar.toUpperCase()))) return false;
        const dr = tR-fR, dc = tC-fC, sr = Math.sign(dr), sc = Math.sign(dc);
        const clear = () => { let r=fR+sr, c=fC+sc; while(r!==tR || c!==tC) { if(board[r][c]) return false; r+=sr; c+=sc; } return true; };
        switch(p) {
            case 'p': const d=isW?-1:1; if(fC===tC && !tar) return dr===d || (dr===2*d && fR===(isW?6:1) && !board[fR+d][fC]); return Math.abs(dc)===1 && dr===d && tar;
            case 'r': return (fR===tR || fC===tC) && clear();
            case 'n': return (Math.abs(dr)===2 && Math.abs(dc)===1) || (Math.abs(dr)===1 && Math.abs(dc)===2);
            case 'b': return Math.abs(dr)===Math.abs(dc) && clear();
            case 'q': return (fR===tR || fC===tC || Math.abs(dr)===Math.abs(dc)) && clear();
            case 'k': return Math.abs(dr)<=1 && Math.abs(dc)<=1;
        } return false;
    }

    function isCheck(color) {
        let kp=null, kc=color==='W'?'K':'k';
        for(let r=0;r<8;r++) for(let c=0;c<8;c++) if(board[r][c]===kc) kp={r,c};
        if(!kp) return false;
        for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
            const p=board[r][c]; if(p && (color==='W'?p===p.toLowerCase():p===p.toUpperCase()))
                if(isValidMove(r,c,kp.r,kp.c)) return true;
        } return false;
    }

    function updateView() {
        const inCheck = isCheck(turn);
        boardEl.querySelectorAll('.square').forEach(sq => {
            const r = parseInt(sq.dataset.r), c = parseInt(sq.dataset.c);
            sq.classList.remove('selected-sq', 'check-sq', 'hint');
            if (selected && selected.r === r && selected.c === c) sq.classList.add('selected-sq');
            if (inCheck && board[r][c] === (turn === 'W' ? 'K' : 'k')) sq.classList.add('check-sq');
        });
        updateTimerDisplay();
    }

    function showHints(r, c) {
        boardEl.querySelectorAll('.square').forEach(sq => {
            if (isValidMove(r, c, parseInt(sq.dataset.r), parseInt(sq.dataset.c))) {
                const tr = parseInt(sq.dataset.r), tc = parseInt(sq.dataset.c);
                const p = board[r][c], org = board[tr][tc];
                board[tr][tc] = p; board[r][c] = '';
                if(!isCheck(turn)) sq.classList.add('hint');
                board[r][c] = p; board[tr][tc] = org;
            }
        });
    }

    function toggleTheme() { 
        document.body.classList.toggle('light-mode'); 
        updateThemeText(); 
    }

    function updateThemeText() {
        const isLight = document.body.classList.contains('light-mode');
        document.getElementById('theme-text').innerText = isLight ? langData[currentLang].dark : langData[currentLang].light;
    }

    initBoard();
</script>
</body>
</html>
